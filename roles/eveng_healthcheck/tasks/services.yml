---
# Service health checks

- name: Check Apache service status
  systemd:
    name: apache2
  register: apache_service
  failed_when: false
  tags:
    - health_services
    - apache

- name: Check Apache is running
  service_facts:
  register: service_facts_result
  tags:
    - health_services

- name: Set Apache status
  set_fact:  
    health_check_results:  "{{ health_check_results | combine({'services':  health_check_results.services | combine({'apache': apache_status})}) }}"
  vars:
    apache_status: 
      running: "{{ ansible_facts.services['apache2.service'].state == 'running' }}"
      enabled: "{{ ansible_facts.services['apache2.service'].status == 'enabled' }}"
  tags: 
    - health_services
    - apache

- name: Check MySQL service status
  service_facts:
  tags:
    - health_services
    - mysql

- name:  Determine database service
  set_fact:
    db_service_name: "{{ 'mysql.service' if 'mysql.service' in ansible_facts.services else 'mariadb.service' }}"
  tags:
    - health_services
    - mysql

- name: Set database service status
  set_fact:  
    health_check_results: "{{ health_check_results | combine({'services': health_check_results.services | combine({'database': db_status})}) }}"
  vars:
    db_status: 
      running: "{{ ansible_facts.services[db_service_name].state == 'running' }}"
      enabled: "{{ ansible_facts.services[db_service_name].status == 'enabled' }}"
      service:  "{{ db_service_name | replace('.service', '') }}"
  tags:
    - health_services
    - mysql

- name: Check Apache port listening
  wait_for:
    port: 80
    timeout: 5
  register: apache_port
  failed_when: false
  tags: 
    - health_services
    - apache
    - ports

- name: Check MySQL port listening
  wait_for:
    port: 3306
    timeout: 5
  register: mysql_port
  failed_when: false
  tags: 
    - health_services
    - mysql
    - ports

- name: Update service health results
  set_fact:
    health_check_results: "{{ health_check_results | combine({'services': health_check_results.services | combine({'ports': port_status})}) }}"
  vars:
    port_status:  
      apache: "{{ apache_port is success }}"
      mysql: "{{ mysql_port is success }}"
  tags:
    - health_services
    - ports

- name: Service health summary
  debug: 
    msg: 
      - "Apache: {{ 'OK' if health_check_results.services.apache.running else 'FAILED' }}"
      - "Database: {{ 'OK' if health_check_results.services.database.running else 'FAILED' }}"
  when: health_check_report_format == 'detailed'
  tags:
    - health_services