---
# Lab health checks

- name: Find lab files
  find:
    paths: /opt/unetlab/labs
    patterns: '*.unl'
    recurse: yes
  register: lab_files
  tags:
    - health_labs
    - labs
    - lab_files

- name: Set lab count
  set_fact: 
    health_check_results:  "{{ health_check_results | combine({'labs': health_check_results.labs | combine({'total_count': lab_files.files | length})}) }}"
  tags:
    - health_labs
    - labs
    - lab_files

- name: Get lab list from API
  uri:
    url:  "http://{{ ansible_default_ipv4.address }}/api/labs"
    method: GET
    headers:
      Cookie: "{{ api_auth.cookies_string | default('') }}"
    status_code: [200, 401]
    return_content:  yes
    validate_certs:  no
  register: api_labs_list
  failed_when: false
  tags:
    - health_labs
    - labs
    - lab_api

- name: Set API lab count
  set_fact: 
    health_check_results:  "{{ health_check_results | combine({'labs': health_check_results.labs | combine({'api_accessible': api_lab_count})}) }}"
  vars:
    api_lab_count: "{{ api_labs_list.json.data | length if api_labs_list.status == 200 and api_labs_list.json.data is defined else 0 }}"
  tags:
    - health_labs
    - labs
    - lab_api

- name: Check for running lab nodes
  shell: |
    ps aux | grep -E 'qemu|dynamips' | grep -v grep | wc -l
  register: running_nodes
  changed_when: false
  failed_when: false
  tags: 
    - health_labs
    - labs
    - running_nodes

- name: Set running nodes count
  set_fact: 
    health_check_results: "{{ health_check_results | combine({'labs': health_check_results.labs | combine({'running_nodes':  running_nodes.stdout | int})}) }}"
  tags:
    - health_labs
    - labs
    - running_nodes

- name: Check tmp directory usage
  shell: du -sh /opt/unetlab/tmp 2>/dev/null || echo "0"
  register: tmp_usage
  changed_when: false
  tags:
    - health_labs
    - labs
    - tmp_usage

- name:  Set tmp directory status
  set_fact:
    health_check_results: "{{ health_check_results | combine({'labs': health_check_results.labs | combine({'tmp_usage': tmp_usage.stdout.split()[0] | default('0')})}) }}"
  tags:
    - health_labs
    - labs
    - tmp_usage

- name: Check for zombie processes
  shell: |
    ps aux | grep -E 'qemu|dynamips' | grep -v grep | awk '{if ($8 == "Z") print $0}' | wc -l
  register: zombie_procs
  changed_when: false
  failed_when: false
  tags:
    - health_labs
    - labs
    - zombie_check

- name: Set zombie process count
  set_fact: 
    health_check_results: "{{ health_check_results | combine({'labs': health_check_results.labs | combine({'zombie_processes': zombie_procs.stdout | int})}) }}"
  tags:
    - health_labs
    - labs
    - zombie_check

- name: Labs health summary
  debug:
    msg:
      - "Total labs: {{ health_check_results.labs.total_count }}"
      - "Running nodes: {{ health_check_results.labs.running_nodes }}"
      - "Temp usage: {{ health_check_results.labs.tmp_usage }}"
      - "Zombie processes: {{ health_check_results.labs.zombie_processes | default(0) }}"
  when: health_check_report_format == 'detailed'
  tags: 
    - health_labs
    - labs