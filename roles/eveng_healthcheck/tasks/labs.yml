---
# purpose: Lab health checks
# maintainer: HybridOps.Studio

- name: Find lab files
  ansible.builtin.find:
    paths: /opt/unetlab/labs
    patterns: "*.unl"
    recurse: true
  register: eveng_healthcheck_lab_files
  tags:
    - health_labs
    - labs
    - lab_files

- name: Get lab list from API
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/labs"
    method: GET
    headers:
      Cookie: "unetlab_session={{ eveng_healthcheck_session_cookie | default('') }}"
    status_code: [200, 401]
    return_content: true
    validate_certs: false
  register: eveng_healthcheck_api_labs_list
  failed_when: false
  tags:
    - health_labs
    - labs
    - lab_api

- name: Check for running lab nodes
  ansible.builtin.shell: |
    set -o pipefail
    ps aux | grep -E 'qemu|dynamips' | grep -v grep | wc -l
  register: eveng_healthcheck_running_nodes
  changed_when: false
  failed_when: false
  tags:
    - health_labs
    - labs
    - running_nodes

- name: Check tmp directory usage
  ansible.builtin.shell: du -sh /opt/unetlab/tmp 2>/dev/null || echo "0"
  register: eveng_healthcheck_tmp_usage
  changed_when: false
  tags:
    - health_labs
    - labs
    - tmp_usage

- name: Check for zombie processes
  ansible.builtin.shell: |
    set -o pipefail
    ps aux | grep -E 'qemu|dynamips' | grep -v grep | awk '{if ($8 == "Z") print $0}' | wc -l
  register: eveng_healthcheck_zombie_processes
  changed_when: false
  failed_when: false
  tags:
    - health_labs
    - labs
    - zombie_check

- name: Update lab health results
  ansible.builtin.set_fact:
    eveng_healthcheck_results: >-
      {{
        eveng_healthcheck_results
        | combine(
          {
            'labs': {
              'total_count': eveng_healthcheck_lab_files.files | length,
              'api_accessible': eveng_healthcheck_api_lab_count,
              'running_nodes': eveng_healthcheck_running_nodes.stdout | int,
              'tmp_usage': eveng_healthcheck_tmp_usage.stdout.split()[0] | default('0'),
              'zombie_processes': eveng_healthcheck_zombie_processes.stdout | int
            }
          },
          recursive=True
        )
      }}
  vars:
    eveng_healthcheck_api_lab_count: >-
      {{
        eveng_healthcheck_api_labs_list.json.data | length
        if (
          eveng_healthcheck_api_labs_list.status == 200 and
          eveng_healthcheck_api_labs_list.json.data is defined
        )
        else 0
      }}
  changed_when: false
  tags:
    - health_labs
    - labs

- name: Labs health summary
  ansible.builtin.debug:
    msg:
      - "Total labs: {{ eveng_healthcheck_results.labs.total_count }}"
      - "Running nodes: {{ eveng_healthcheck_results.labs.running_nodes }}"
      - "Temp usage: {{ eveng_healthcheck_results.labs.tmp_usage }}"
      - "Zombie processes: {{ eveng_healthcheck_results.labs.zombie_processes | default(0) }}"
  when: eveng_healthcheck_effective_report_format == 'detailed'
  tags:
    - health_labs
    - labs
