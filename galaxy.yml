---
# purpose: Ansible Galaxy metadata for hybridops.helper collection
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Tech

namespace: hybridops
name: helper
version: "0.1.2"

readme: README.md
description: >-
  Helper roles for HybridOps, focused on EVE-NG content handling, inventory
  export, NetBox integration, and reusable operational checks.

authors:
  - HybridOps.Tech

license:
  - MIT-0

tags:
  - hybridops
  - netbox
  - inventory
  - automation
  - audit
  - eveng
  - tools

homepage: https://hybridops.tech
documentation: https://docs.hybridops.tech
repository: https://github.com/hybridops-tech/ansible-collection-helper
issues: https://github.com/hybridops-tech/ansible-collection-helper/issues

dependencies:
  hybridops.common: ">=0.1.0"

build_ignore:
  - .git
  - .github
  - .ansible
  - .tox
  - .venv
  - build
  - dist
  - output
  - tests/output
  - tests/outputs
  - roles/eveng_images/tests/output
  - roles/eveng_healthcheck/tests/outputs
  - __pycache__
  - .mypy_cache
  - .pytest_cache
