# purpose: CI for HybridOps Ansible collection (lint + build sanity).
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Tech

name: hybridops.helper CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: collection-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pre-commit ansible-lint

      - name: Run pre-commit
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            pre-commit run --from-ref "${BASE_SHA}" --to-ref HEAD
          else
            pre-commit run --all-files
          fi

      - name: Run ansible-lint on changed Ansible files
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "${BASE_SHA}" ] || printf '%s' "${BASE_SHA}" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD | tail -n1)"
          fi
          mapfile -t LINT_TARGETS < <(
            git diff --name-only --diff-filter=ACMR "${BASE_SHA}" HEAD -- \
              galaxy.yml \
              requirements.yml \
              ':(glob)roles/**/*.yml' \
              ':(glob)roles/**/*.yaml' \
            | sort -u
          )
          if [ "${#LINT_TARGETS[@]}" -eq 0 ]; then
            echo "No changed Ansible files to lint."
            exit 0
          fi
          printf 'ansible-lint targets:\n'
          printf '  %s\n' "${LINT_TARGETS[@]}"
          ansible-lint -c .config/linters/ansible-lint.yml "${LINT_TARGETS[@]}"

      - name: Build collection (sanity)
        run: |
          ansible-galaxy collection build --force
