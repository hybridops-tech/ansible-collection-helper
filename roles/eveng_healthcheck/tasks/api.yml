---
# purpose: API health checks
# maintainer: HybridOps.Studio

- name: Test API login endpoint
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/auth/login"
    method: POST
    body_format: json
    body:
      username: "{{ eveng_healthcheck_effective_admin_username }}"
      password: "{{ eveng_healthcheck_effective_admin_password }}"
    status_code: [200, 400]
    return_content: true
    validate_certs: false
    timeout: 10
  register: eveng_healthcheck_api_login
  failed_when: false
  tags:
    - health_api

- name: Extract session cookie
  ansible.builtin.set_fact:
    eveng_healthcheck_session_cookie: >-
      {{
        eveng_healthcheck_api_login.cookies.unetlab_session
        if eveng_healthcheck_api_login.status == 200
        else ''
      }}
  changed_when: false
  tags:
    - health_api

- name: Test API status endpoint
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/status"
    method: GET
    headers:
      Cookie: "unetlab_session={{ eveng_healthcheck_session_cookie }}"
    status_code: [200, 401, 412]
    return_content: true
    validate_certs: false
    timeout: 10
  register: eveng_healthcheck_api_status
  failed_when: false
  when: eveng_healthcheck_api_login.status == 200
  tags:
    - health_api

- name: Test API folders endpoint
  ansible.builtin.uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/folders/"
    method: GET
    headers:
      Cookie: "unetlab_session={{ eveng_healthcheck_session_cookie }}"
    status_code: [200, 401]
    return_content: true
    validate_certs: false
    timeout: 10
  register: eveng_healthcheck_api_folders
  failed_when: false
  when: eveng_healthcheck_api_login.status == 200
  tags:
    - health_api

- name: Update API health results
  ansible.builtin.set_fact:
    eveng_healthcheck_results: >-
      {{
        eveng_healthcheck_results
        | combine(
          {
            'api': {
              'authentication': {
                'success': eveng_healthcheck_api_login.status == 200,
                'cookie_present': eveng_healthcheck_session_cookie | length > 0
              },
              'reachable': eveng_healthcheck_api_login.status in [200, 400],
              'endpoints': {
                'login': eveng_healthcheck_api_login.status == 200,
                'status': eveng_healthcheck_api_status.status | default(0) == 200,
                'folders': eveng_healthcheck_api_folders.status | default(0) == 200
              },
              'status': eveng_healthcheck_api_overall_status
            }
          },
          recursive=True
        )
      }}
  vars:
    eveng_healthcheck_api_overall_status: >-
      {{
        'pass'
        if (
          (eveng_healthcheck_api_login.status in [200, 400]) and
          (eveng_healthcheck_api_login.status == 200) and
          (eveng_healthcheck_api_status.status | default(0) == 200) and
          (eveng_healthcheck_api_folders.status | default(0) == 200)
        )
        else 'fail'
      }}
  changed_when: false
  tags:
    - health_api

- name: API health summary
  ansible.builtin.debug:
    msg:
      - "API reachable: {{ eveng_healthcheck_results.api.reachable }}"
      - >-
        Login:
        {{ 'OK' if eveng_healthcheck_results.api.authentication.success else 'FAILED' }}
      - >-
        Status endpoint:
        {{ 'OK' if eveng_healthcheck_results.api.endpoints.status else 'FAILED' }}
      - >-
        Folders endpoint:
        {{ 'OK' if eveng_healthcheck_results.api.endpoints.folders else 'FAILED' }}
  when: eveng_healthcheck_effective_report_format == 'detailed'
  tags:
    - health_api
