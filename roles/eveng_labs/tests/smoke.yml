# purpose: Smoke test eveng_labs role
# maintainer: HybridOps.Tech

- name: Smoke test EVE-NG labs deployment
  hosts: cicd_test
  become: true

  vars:
    # Primary smoke path: local source from controller
    eveng_labs_source: local
    eveng_labs_local_path: "{{ playbook_dir }}/file/eveng_lab_sample.zip"

    eveng_labs_lab_folders:
      - SmokeTest
    # Alternative Git source example
    # eveng_labs_source: git
    # eveng_labs_git_repo: "git@github.com:example/eveng-labs.git"
    # eveng_labs_git_version: "main"

    # Alternative remote source example
    # eveng_labs_source: remote
    # eveng_labs_remote_host: filesrv-01
    # eveng_labs_remote_path: /data/eveng/labs

  tasks:
    - name: Deploy labs
      ansible.builtin.include_role:
        name: hybridops.helper.eveng_labs

    - name: Verify SmokeTest lab directory exists
      ansible.builtin.stat:
        path: /opt/unetlab/labs/SmokeTest
      register: eveng_labs_test_folder

    - name: Assert SmokeTest directory present
      ansible.builtin.assert:
        that:
          - eveng_labs_test_folder.stat.exists
        fail_msg: "SmokeTest lab directory not found under /opt/unetlab/labs"
