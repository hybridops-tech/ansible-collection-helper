---
- name: Test API login endpoint
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/auth/login"
    method: POST
    body_format: json
    body:
      username: "{{ eveng_admin_username | default('admin') }}"
      password: "{{ eveng_admin_password | default('eve') }}"
    status_code: [ 200, 400 ]
    return_content: yes
    validate_certs: no
    timeout: 10
  register: api_login
  failed_when: false
  tags:
  - health_api

- name: Set API authentication result
  set_fact:
    health_check_results: "{{ health_check_results | combine({'api':  health_check_results.api | combine({'authentication': auth_result})}, recursive=True) }}"
  vars:
    auth_result:
      success: "{{ api_login.status == 200 }}"
      cookie_present: "{{ 'set-cookie' in (api_login.cookies | default({})) or 'unetlab_session' in (api_login.cookies | default({})) }}"
  tags:
  - health_api

- name: Extract session cookie
  set_fact:
    api_session_cookie: "{{ api_login.cookies.unetlab_session if api_login.status == 200 else '' }}"
  when: api_login.status == 200
  tags:
  - health_api

- name: Test API status endpoint (authenticated)
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/status"
    method: GET
    headers:
      Cookie: "unetlab_session={{ api_session_cookie }}"
    status_code: [ 200, 401, 412 ]
    return_content: yes
    validate_certs: no
    timeout: 10
  register: api_status
  failed_when: false
  when: api_login.status == 200
  tags:
  - health_api

- name: Test API folders endpoint (authenticated)
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/folders/"
    method: GET
    headers:
      Cookie: "unetlab_session={{ api_session_cookie }}"
    status_code: [ 200, 401 ]
    return_content: yes
    validate_certs: no
    timeout: 10
  register: api_folders
  failed_when: false
  when: api_login.status == 200
  tags:
  - health_api

- name: Set API endpoints status
  set_fact:
    health_check_results: "{{ health_check_results | combine({'api': health_check_results.api | combine({'endpoints':  endpoints_status, 'reachable': api_reachable})}, recursive=True) }}"
  vars:
    endpoints_status:
      login: "{{ api_login.status == 200 }}"
      status: "{{ api_status.status | default(0) == 200 }}"
      folders: "{{ api_folders.status | default(0) == 200 }}"
    api_reachable: "{{ api_login.status in [200, 400] }}"
  tags:
  - health_api

- name: Set API overall status
  set_fact:
    health_check_results: "{{ health_check_results | combine({'api': health_check_results.api | combine({'status': api_status_result})}, recursive=True) }}"
  vars:
    api_status_result: "{{ 'pass' if (health_check_results.api.reachable and health_check_results.api.authentication.success and health_check_results.api.endpoints.status and health_check_results.api.endpoints.folders) else 'fail' }}"
  tags:
  - health_api

- name: API health summary
  debug:
    msg:
    - "API reachable: {{ health_check_results.api.reachable }}"
    - "Login:  {{ 'OK' if health_check_results.api.authentication.success else 'FAILED' }}"
    - "Status endpoint: {{ 'OK' if health_check_results.api.endpoints.status else 'FAILED' }}"
    - "Folders endpoint: {{ 'OK' if health_check_results.api.endpoints.folders else 'FAILED' }}"
  when: health_check_report_format == 'detailed'
  tags:
  - health_api
