---
# purpose: Image health checks
# maintainer: HybridOps.Studio

- name: Find QEMU images
  ansible.builtin.find:
    paths: /opt/unetlab/addons/qemu
    file_type: directory
    recurse: false
  register: eveng_healthcheck_qemu_images
  tags:
    - health_images
    - images
    - qemu_images

- name: Find IOL images
  ansible.builtin.find:
    paths: /opt/unetlab/addons/iol/bin
    patterns: "*"
    file_type: file
  register: eveng_healthcheck_iol_images
  failed_when: false
  tags:
    - health_images
    - images
    - iol_images

- name: Find Dynamips images
  ansible.builtin.find:
    paths: /opt/unetlab/addons/dynamips
    patterns: "*"
    file_type: file
  register: eveng_healthcheck_dynamips_images
  failed_when: false
  tags:
    - health_images
    - images
    - dynamips_images

- name: Update image health results
  ansible.builtin.set_fact:
    eveng_healthcheck_results: >-
      {{
        eveng_healthcheck_results
        | combine(
          {
            'images': {
              'qemu_count': eveng_healthcheck_qemu_images.files | length,
              'iol_count': eveng_healthcheck_iol_count,
              'dynamips_count': eveng_healthcheck_dynamips_count,
              'qemu_list': eveng_healthcheck_qemu_list,
              'common_images': eveng_healthcheck_common_images
            }
          },
          recursive=True
        )
      }}
  vars:
    eveng_healthcheck_iol_count: >-
      {{
        eveng_healthcheck_iol_images.files | length
        if eveng_healthcheck_iol_images.files is defined
        else 0
      }}
    eveng_healthcheck_dynamips_count: >-
      {{
        eveng_healthcheck_dynamips_images.files | length
        if eveng_healthcheck_dynamips_images.files is defined
        else 0
      }}
    eveng_healthcheck_qemu_list: >-
      {{
        eveng_healthcheck_qemu_images.files
        | map(attribute='path')
        | map('basename')
        | list
      }}
    eveng_healthcheck_common_images:
      cisco_iosv: >-
        {{ eveng_healthcheck_qemu_list | select('search', 'vios') | list | length > 0 }}
      cisco_iosvl2: >-
        {{ eveng_healthcheck_qemu_list | select('search', 'viosl2') | list | length > 0 }}
      cisco_asav: >-
        {{ eveng_healthcheck_qemu_list | select('search', 'asav') | list | length > 0 }}
      juniper_vmx: >-
        {{ eveng_healthcheck_qemu_list | select('search', 'vmx') | list | length > 0 }}
  changed_when: false
  tags:
    - health_images
    - images

- name: Images health summary
  ansible.builtin.debug:
    msg:
      - "QEMU images: {{ eveng_healthcheck_results.images.qemu_count }}"
      - "IOL images: {{ eveng_healthcheck_results.images.iol_count }}"
      - "Dynamips images: {{ eveng_healthcheck_results.images.dynamips_count }}"
  when: eveng_healthcheck_effective_report_format == 'detailed'
  tags:
    - health_images
    - images
