# purpose: Ansible Galaxy metadata for hybridops.helper collection
# adr: ADR-0606-ansible-collections-release-process
# maintainer: HybridOps.Studio

namespace: hybridops
name: helper
version: 0.1.0

readme: README.md
description: >
  Evidence and NetBox helper roles for HybridOps.Studio, focused on structured artefacts, inventory export, and NetBox integration.

authors:
- HybridOps.Studio

license:
- MIT-0

min_ansible_version: "2.15"

tags:
- hybridops
- evidence
- netbox
- inventory
- automation
- audit

homepage: https://docs.hybridops.studio
documentation: https://docs.hybridops.studio
repository: https://github.com/hybridops-studio/ansible-collection-helper
issues: https://github.com/hybridops-studio/ansible-collection-helper/issues

dependencies:
  hybridops.common: ">=0.1.0"

build_ignore:
- .git
- .github
- .tox
- .venv
- build
- dist
- output
- tests/output
- __pycache__
- .mypy_cache
- .pytest_cache
