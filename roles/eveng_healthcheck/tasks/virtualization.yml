---
# purpose: Virtualization health checks
# maintainer: HybridOps.Tech

- name: Check KVM module loaded
  ansible.builtin.command: lsmod
  register: eveng_healthcheck_lsmod_output
  changed_when: false
  failed_when: false
  tags:
    - health_virtualization
    - virtualization
    - kvm
    - kvm_module

- name: Check KVM device exists
  ansible.builtin.stat:
    path: /dev/kvm
  register: eveng_healthcheck_kvm_device
  tags:
    - health_virtualization
    - virtualization
    - kvm
    - kvm_device

- name: Check CPU virtualization support
  ansible.builtin.command: grep -E '(vmx|svm)' /proc/cpuinfo
  register: eveng_healthcheck_cpu_virt
  changed_when: false
  failed_when: false
  tags:
    - health_virtualization
    - virtualization
    - cpu_virt

- name: Check QEMU directory exists
  ansible.builtin.stat:
    path: /opt/unetlab/addons/qemu
  register: eveng_healthcheck_qemu_dir
  tags:
    - health_virtualization
    - virtualization
    - qemu

- name: Check IOL directory exists
  ansible.builtin.stat:
    path: /opt/unetlab/addons/iol
  register: eveng_healthcheck_iol_dir
  tags:
    - health_virtualization
    - virtualization
    - iol

- name: Update virtualization health results
  ansible.builtin.set_fact:
    eveng_healthcheck_results: >-
      {{
        eveng_healthcheck_results
        | combine(
          {
            'virtualization': {
              'kvm_module_loaded': 'kvm' in eveng_healthcheck_lsmod_output.stdout,
              'kvm_device_exists': eveng_healthcheck_kvm_device.stat.exists,
              'cpu_virt_supported': eveng_healthcheck_cpu_virt.rc == 0,
              'qemu_dir_exists': eveng_healthcheck_qemu_dir.stat.exists,
              'iol_dir_exists': eveng_healthcheck_iol_dir.stat.exists,
              'status': eveng_healthcheck_virtualization_status
            }
          },
          recursive=True
        )
      }}
  vars:
    eveng_healthcheck_virtualization_status: >-
      {{
        'full'
        if (
          ('kvm' in eveng_healthcheck_lsmod_output.stdout) and
          eveng_healthcheck_kvm_device.stat.exists
        )
        else 'limited'
      }}
  changed_when: false
  tags:
    - health_virtualization
    - virtualization

- name: Virtualization health summary
  ansible.builtin.debug:
    msg:
      - >-
        KVM module:
        {{ 'Loaded' if eveng_healthcheck_results.virtualization.kvm_module_loaded else 'Not loaded' }}
      - >-
        KVM device:
        {{ 'Present' if eveng_healthcheck_results.virtualization.kvm_device_exists else 'Missing' }}
      - >-
        CPU support:
        {{ 'Yes' if eveng_healthcheck_results.virtualization.cpu_virt_supported else 'No' }}
      - "Status: {{ eveng_healthcheck_results.virtualization.status }}"
  when: eveng_healthcheck_effective_report_format == 'detailed'
  tags:
    - health_virtualization
    - virtualization
