---
# purpose: Service health checks
# maintainer: HybridOps.Studio

- name: Gather service facts
  ansible.builtin.service_facts:
  tags:
    - health_services

- name: Determine database service name
  ansible.builtin.set_fact:
    eveng_healthcheck_db_service_name: >-
      {{
        'mysql.service'
        if 'mysql.service' in ansible_facts.services
        else 'mariadb.service'
      }}
  changed_when: false
  tags:
    - health_services
    - mysql

- name: Check Apache port listening
  ansible.builtin.wait_for:
    port: 80
    timeout: 5
  register: eveng_healthcheck_apache_port
  failed_when: false
  tags:
    - health_services
    - apache
    - ports

- name: Check database port listening
  ansible.builtin.wait_for:
    port: 3306
    timeout: 5
  register: eveng_healthcheck_database_port
  failed_when: false
  tags:
    - health_services
    - mysql
    - ports

- name: Update service health results
  ansible.builtin.set_fact:
    eveng_healthcheck_results: >-
      {{
        eveng_healthcheck_results
        | combine(
          {
            'services': {
              'apache': {
                'running': (
                  ansible_facts.services['apache2.service'].state | default('')
                ) == 'running',
                'enabled': (
                  ansible_facts.services['apache2.service'].status | default('')
                ) == 'enabled'
              },
              'database': {
                'running': (
                  ansible_facts.services[eveng_healthcheck_db_service_name].state
                  | default('')
                ) == 'running',
                'enabled': (
                  ansible_facts.services[eveng_healthcheck_db_service_name].status
                  | default('')
                ) == 'enabled',
                'service': eveng_healthcheck_db_service_name
                  | replace('.service', '')
              },
              'ports': {
                'apache': eveng_healthcheck_apache_port is succeeded,
                'mysql': eveng_healthcheck_database_port is succeeded
              }
            }
          },
          recursive=True
        )
      }}
  changed_when: false
  tags:
    - health_services

- name: Service health summary
  ansible.builtin.debug:
    msg:
      - "Apache: {{ 'OK' if eveng_healthcheck_results.services.apache.running else 'FAILED' }}"
      - "Database: {{ 'OK' if eveng_healthcheck_results.services.database.running else 'FAILED' }}"
  when: eveng_healthcheck_effective_report_format == 'detailed'
  tags:
    - health_services
